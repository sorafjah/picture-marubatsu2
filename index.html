<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>◯✕クイズアプリ</title>
    <style>
        * {
            box-sizing: border-box;
            touch-action: manipulation;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: #f0f8ff;
            font-family: 'BIZ UDPGothic', 'UD DigiKyouka', 'Hiragino Kaku Gothic ProN', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }

        .image-area {
            position: relative;
            width: 100%;
            height: 55vh;
            background-color: #e0e0e0;
            border: 6px dashed #aaaaaa;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            cursor: pointer;
            transition: background-color 0.2s, border-color 0.2s;
        }

        .image-area:not(.has-image):hover {
            background-color: #d5e5f5;
            border-color: #4a90e2;
        }

        .image-area.has-image {
            border: none;
            background-color: transparent;
            cursor: default;
        }

        .placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #777777;
            text-align: center;
            pointer-events: none;
        }

        .placeholder-icon { font-size: 80px; margin-bottom: 10px; }
        .placeholder-text { font-size: 28px; font-weight: bold; }
        .placeholder-subtext { font-size: 16px; font-weight: normal; color: #888888; margin-top: 8px; }

        #camera-video {
            display: none;
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 24px;
            border: 6px solid #ff9800;
        }

        #preview-image {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            display: none;
            border-radius: 18px;
            transition: border 0.2s;
        }

        .image-area.has-image #preview-image {
            border: 6px solid #4a90e2;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
        }

        .circle-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 260px;
            height: 260px;
            border: 35px solid #7cb342;
            border-radius: 50%;
            opacity: 0;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease;
            pointer-events: none;
            z-index: 10;
        }

        .circle-overlay.show {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }

        .fade-out-animation {
            animation: fadeOutUp 0.6s forwards cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        @keyframes fadeOutUp {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -150%) scale(0.7); opacity: 0; }
        }

        .sparkle {
            position: absolute;
            pointer-events: none;
            z-index: 11;
            font-size: 30px;
            opacity: 0;
        }

        @keyframes sparkle-burst {
            0% { transform: translate(-50%, -50%) scale(0) rotate(0deg); opacity: 0; }
            15% { opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(1.2) rotate(var(--rot)); opacity: 0; }
        }

        .batsu-overlay {
            position: absolute;
            background-color: rgba(30, 38, 58, 0.7);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
            z-index: 10;
            border-radius: 18px;
        }

        .batsu-overlay.show { opacity: 1; }

        .batsu-overlay.fade-out {
            animation: fadeOutBatsu 0.4s forwards ease;
        }

        @keyframes fadeOutBatsu {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }

        .batsu-emoji {
            font-size: clamp(60px, 15vh, 120px);
            animation: shiver 0.5s infinite;
        }

        .batsu-text {
            font-size: clamp(20px, 4vh, 36px);
            font-weight: bold;
            color: #8fa4c1;
            margin-top: 10px;
            letter-spacing: 2px;
            text-shadow: 2px 2px 6px rgba(0,0,0,0.6);
        }

        @keyframes shiver {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            20% { transform: translate(-4px, 2px) rotate(-3deg); }
            40% { transform: translate(4px, -2px) rotate(3deg); }
            60% { transform: translate(-3px, -2px) rotate(-1deg); }
            80% { transform: translate(3px, 2px) rotate(2deg); }
        }

        /* --- コントロールエリア：まもるくんを右に置くためrelativeに --- */
        .control-area {
            width: 100%;
            display: flex;
            justify-content: center;
            min-height: 120px;
            position: relative;
        }

        input[type="file"] { display: none; }

        .btn {
            font-family: inherit;
            font-size: 32px;
            font-weight: bold;
            padding: 20px 40px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 8px 0 #b0b0b0;
            transition: transform 0.1s, box-shadow 0.1s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #b0b0b0;
        }

        .btn-camera { background-color: #ff9800; color: white; box-shadow: 0 8px 0 #e65100; }
        .btn-camera:active { box-shadow: 0 4px 0 #e65100; }

        .btn-gallery { background-color: #03a9f4; color: white; box-shadow: 0 8px 0 #01579b; }
        .btn-gallery:active { box-shadow: 0 4px 0 #01579b; }

        .btn-shutter { background-color: #ff9800; color: white; box-shadow: 0 8px 0 #e65100; }
        .btn-shutter:active { box-shadow: 0 4px 0 #e65100; }

        .btn-cancel { background-color: #757575; color: white; box-shadow: 0 8px 0 #424242; }
        .btn-cancel:active { box-shadow: 0 4px 0 #424242; }

        .initial-buttons, .camera-buttons {
            display: flex;
            gap: 25px;
            align-items: center;
        }

        .camera-buttons { display: none; }

        .hidden-quiz-trigger {
            display: none;
            width: 100%;
            max-width: 600px;
            height: 100px;
            position: relative;
            cursor: pointer;
            background-color: transparent;
            border: none;
            box-shadow: none;
        }

        .quiz-text-label {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: bold;
            color: #333333;
            letter-spacing: 12px;
            pointer-events: none;
            z-index: 2;
            text-shadow: 1px 1px 0 #fff, -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff;
        }

        .secret-hit-box {
            position: absolute;
            top: 0;
            height: 100%;
            width: 50%;
            z-index: 1;
            background: transparent;
            border-radius: 20px;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        .hit-left { left: 0; }
        .hit-right { right: 0; }

        .btn-next {
            display: none;
            background-color: #4caf50;
            color: white;
            font-size: 40px;
            padding: 25px 100px;
            box-shadow: 0 8px 0 #1b5e20;
        }
        .btn-next:active { box-shadow: 0 4px 0 #1b5e20; }

        #capture-canvas { display: none; }

        /* ==============================
           まもるくん
           コントロールエリアの右端に配置
        ============================== */
        #mamoru-wrap {
            position: absolute;
            right: 0;
            bottom: 0;
            width: 150px;
            height: 165px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            z-index: 20;
        }

        #mamoru-img, #mamoru2-img {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 150px;
            height: auto;
            pointer-events: none;
            transform-origin: bottom center;
        }

        #mamoru2-img {
            display: none;
            opacity: 0;
        }

        /* 通常：ゆらゆら */
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            30%  { transform: translateY(-5px) rotate(1.2deg); }
            70%  { transform: translateY(-3px) rotate(-0.8deg); }
        }

        /* ○正解：ジャンプ */
        @keyframes jump {
            0%   { transform: translateY(0px) scale(1); }
            25%  { transform: translateY(-30px) scale(1.08); }
            50%  { transform: translateY(-45px) scale(1.12); }
            70%  { transform: translateY(-20px) scale(1.05); }
            85%  { transform: translateY(-8px) scale(1.02); }
            100% { transform: translateY(0px) scale(1); }
        }

        /* タップ：ちょっとうれしそうに揺れる */
        @keyframes happy-wiggle {
            0%   { transform: rotate(0deg) scale(1); }
            20%  { transform: rotate(-6deg) scale(1.05) translateY(-3px); }
            40%  { transform: rotate(6deg) scale(1.08) translateY(-5px); }
            60%  { transform: rotate(-4deg) scale(1.05) translateY(-2px); }
            80%  { transform: rotate(3deg) scale(1.02) translateY(-1px); }
            100% { transform: rotate(0deg) scale(1) translateY(0); }
        }

        /* スワイプ：外から滑り込む */
        @keyframes slide-in-right {
            0%   { transform: translateX(120px) scale(0.85); opacity: 0; }
            55%  { transform: translateX(-8px) scale(1.04); opacity: 1; }
            75%  { transform: translateX(4px) scale(1); opacity: 1; }
            100% { transform: translateX(0) scale(1); opacity: 1; }
        }

        /* ×：まもる2 悲しそうに揺れる */
        @keyframes sad-shake {
            0%, 100% { transform: rotate(0deg) scale(1); }
            15%  { transform: rotate(-6deg) scale(0.96) translateX(-3px); }
            30%  { transform: rotate(5deg) scale(0.97) translateX(3px); }
            45%  { transform: rotate(-4deg) scale(0.97) translateX(-2px); }
            60%  { transform: rotate(3deg) scale(0.98) translateX(2px); }
            75%  { transform: rotate(-1.5deg) scale(0.99); }
        }

        @keyframes fade-in-up {
            0%   { opacity: 0; transform: translateY(14px) scale(0.92); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes fade-out-down {
            0%   { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(14px) scale(0.92); }
        }

        .mamoru-float    { animation: float 2.8s ease-in-out infinite; }
        .mamoru-jump     { animation: jump 0.75s cubic-bezier(0.36, 0.07, 0.19, 0.97) forwards; }
        .mamoru-wiggle   { animation: happy-wiggle 0.55s ease-in-out forwards; }
        .mamoru-slide    { animation: slide-in-right 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
        .mamoru2-sad     { animation: sad-shake 0.65s ease-in-out; }
        .mamoru2-fadeout { animation: fade-out-down 0.28s ease-in forwards; }
        .mamoru-fadein   { animation: fade-in-up 0.35s ease-out forwards; }

        /* セリフバブル：まもるくんの上に十分余白をとって表示 */
        #mamoru-bubble {
            position: absolute;
            /* コントロールエリアの上端から十分離す */
            bottom: calc(100% + 18px + 2.8em);
            right: 0;
            background: white;
            border: 2.5px solid #7b5ea7;
            border-radius: 14px 14px 4px 14px;
            padding: 7px 13px;
            font-size: 17px;
            font-weight: bold;
            color: #555;
            white-space: nowrap;
            z-index: 30;
            opacity: 0;
            transform: scale(0.85) translateY(6px);
            transform-origin: bottom right;
            transition: opacity 0.18s, transform 0.18s;
            pointer-events: none;
            box-shadow: 0 3px 10px rgba(123, 94, 167, 0.18);
        }

        #mamoru-bubble.show {
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        /* しっぽ：バブルの下右に */
        #mamoru-bubble::after {
            content: '';
            position: absolute;
            bottom: -12px;
            right: 18px;
            border: 6px solid transparent;
            border-top-color: white;
            filter: drop-shadow(0 2px 0 #7b5ea7);
        }

    </style>
</head>
<body>

<div class="container">
    <div class="image-area" id="image-area">
        <div class="placeholder" id="placeholder">
            <div class="placeholder-icon">📸</div>
            <div class="placeholder-text">がぞうを いれてね</div>
            <div class="placeholder-subtext">（クリックや ファイルをドロップしてもOK）</div>
        </div>
        <video id="camera-video" autoplay playsinline></video>
        <img id="preview-image" alt="クイズ画像">
        <div class="circle-overlay" id="circle-overlay"></div>
        <div class="batsu-overlay" id="batsu-overlay">
            <div class="batsu-emoji">🤷</div>
            <div class="batsu-text">ざんねん...</div>
        </div>

<canvas id="capture-canvas"></canvas>
<input type="file" accept="image/*" capture="camera" id="fallback-camera-input">

<script>
    const btnStartCamera   = document.getElementById('btn-start-camera');
    const inputGallery     = document.getElementById('input-gallery');
    const fallbackCameraInput = document.getElementById('fallback-camera-input');
    const imageArea        = document.getElementById('image-area');
    const placeholder      = document.getElementById('placeholder');
    const cameraVideo      = document.getElementById('camera-video');
    const previewImage     = document.getElementById('preview-image');
    const circleOverlay    = document.getElementById('circle-overlay');
    const batsuOverlay     = document.getElementById('batsu-overlay');
    const captureCanvas    = document.getElementById('capture-canvas');
    const initialButtons   = document.getElementById('initial-buttons');
    const cameraButtons    = document.getElementById('camera-buttons');
    const btnShutter       = document.getElementById('btn-shutter');
    const btnCancelCamera  = document.getElementById('btn-cancel-camera');
    const hiddenQuizTrigger= document.getElementById('hidden-quiz-trigger');
    const hitMaru          = document.getElementById('hit-maru');
    const hitBatsu         = document.getElementById('hit-batsu');
    const btnNext          = document.getElementById('btn-next');

    const mamoruWrap  = document.getElementById('mamoru-wrap');
    const mamoruImg   = document.getElementById('mamoru-img');
    const mamoru2Img  = document.getElementById('mamoru2-img');
    const mamoruBubble= document.getElementById('mamoru-bubble');

    let mamoruState = 'normal';
    let bubbleTimer = null;
    let touchStartX = 0, touchStartY = 0, touchMoved = false;

    const cheerMessages = [
        'がんばれ！', 'どっちかな？', 'ゆっくりでいいよ！',
        'よくみてね！', 'おうえんしてるよ！', 'ファイト！',
    ];

    function showBubble(text, duration = 2000) {
        if (bubbleTimer) clearTimeout(bubbleTimer);
        mamoruBubble.textContent = text;
        mamoruBubble.classList.add('show');
        bubbleTimer = setTimeout(() => mamoruBubble.classList.remove('show'), duration);
    }

    function clearMamoruClasses() {
        mamoruImg.classList.remove('mamoru-float','mamoru-jump','mamoru-wiggle','mamoru-slide','mamoru-fadein');
        mamoru2Img.classList.remove('mamoru2-sad','mamoru2-fadeout','mamoru-fadein');
    }

    function resetMamoru() {
        mamoruState = 'normal';
        if (mamoru2Img.style.display !== 'none') {
            mamoru2Img.classList.remove('mamoru2-sad');
            mamoru2Img.classList.add('mamoru2-fadeout');
            setTimeout(() => {
                mamoru2Img.style.display = 'none';
                mamoru2Img.style.opacity = '';
                mamoru2Img.classList.remove('mamoru2-fadeout');
            }, 300);
        }
        clearMamoruClasses();
        mamoruImg.style.display = 'block';
        mamoruImg.style.opacity = '0';
        void mamoruImg.offsetWidth;
        mamoruImg.classList.add('mamoru-fadein');
        setTimeout(() => {
            clearMamoruClasses();
            mamoruImg.style.opacity = '';
            mamoruImg.classList.add('mamoru-float');
        }, 380);
    }

    function mamoruJump() {
        mamoruState = 'maru';
        clearMamoruClasses();
        mamoruImg.classList.add('mamoru-jump');
        showBubble('やったー！✨', 2400);
        setTimeout(() => {
            if (mamoruState === 'maru') {
                clearMamoruClasses();
                mamoruImg.classList.add('mamoru-float');
            }
        }, 800);
    }

    function mamoruSad() {
        mamoruState = 'batsu';
        clearMamoruClasses();
        mamoruImg.style.display = 'none';
        mamoru2Img.style.display = 'block';
        mamoru2Img.style.opacity = '1';
        mamoru2Img.classList.remove('mamoru2-sad','mamoru-fadein');
        void mamoru2Img.offsetWidth;
        mamoru2Img.classList.add('mamoru-fadein');
        setTimeout(() => {
            mamoru2Img.classList.remove('mamoru-fadein');
            mamoru2Img.classList.add('mamoru2-sad');
            showBubble('ざんねん...', 2400);
        }, 360);
    }

    // タップ：くるっと回らず、うれしそうに左右にゆれる
    function mamoruHappyWiggle() {
        if (mamoruState !== 'normal') return;
        clearMamoruClasses();
        mamoruImg.classList.add('mamoru-wiggle');
        const msgs = ['えへへ😊', 'なあに？', 'やほー！', 'みてみて！', 'ねえねえ！'];
        showBubble(msgs[Math.floor(Math.random() * msgs.length)], 1800);
        setTimeout(() => {
            if (mamoruState === 'normal') {
                clearMamoruClasses();
                mamoruImg.classList.add('mamoru-float');
            }
        }, 580);
    }

    function mamoruSwipe() {
        if (mamoruState !== 'normal') return;
        clearMamoruClasses();
        mamoruImg.style.opacity = '0';
        setTimeout(() => {
            mamoruImg.style.opacity = '';
            clearMamoruClasses();
            mamoruImg.classList.add('mamoru-slide');
            showBubble('ひゅっ！💨', 1500);
            setTimeout(() => {
                if (mamoruState === 'normal') {
                    clearMamoruClasses();
                    mamoruImg.style.transform = '';
                    mamoruImg.classList.add('mamoru-float');
                }
            }, 520);
        }, 40);
    }

    mamoruWrap.addEventListener('touchstart', (e) => {
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
        touchMoved = false;
    }, { passive: true });

    mamoruWrap.addEventListener('touchmove', (e) => {
        const dx = Math.abs(e.touches[0].clientX - touchStartX);
        const dy = Math.abs(e.touches[0].clientY - touchStartY);
        if (dx > 15 || dy > 15) touchMoved = true;
    }, { passive: true });

    mamoruWrap.addEventListener('touchend', (e) => {
        e.preventDefault();
        if (touchMoved) mamoruSwipe();
        else mamoruHappyWiggle();
    });

    mamoruWrap.addEventListener('click', () => {
        if (touchMoved) return;
        mamoruHappyWiggle();
    });

    // ときどきまもるくんが話しかけてくる
    function randomBubble() {
        if (mamoruState === 'normal' && hiddenQuizTrigger.style.display === 'block') {
            showBubble(cheerMessages[Math.floor(Math.random() * cheerMessages.length)], 2200);
        }
        setTimeout(randomBubble, 9000 + Math.random() * 7000);
    }
    setTimeout(randomBubble, 5000);

    // ===== 元の処理 =====
    let localStream = null;
    let audioCtx = null;
    let currentFacingMode = 'user';

    function isIOS() {
        return /iPad|iPhone|iPod/.test(navigator.userAgent) ||
               (navigator.userAgent.includes("Mac") && "ontouchend" in document);
    }

    function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    function playMaruSound() {
        initAudio();
        const now = audioCtx.currentTime;
        const osc1 = audioCtx.createOscillator(), gain1 = audioCtx.createGain();
        osc1.type = 'sine'; osc1.frequency.setValueAtTime(659.25, now);
        gain1.gain.setValueAtTime(0.3, now);
        gain1.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
        osc1.connect(gain1); gain1.connect(audioCtx.destination);
        osc1.start(now); osc1.stop(now + 0.4);
        const osc2 = audioCtx.createOscillator(), gain2 = audioCtx.createGain();
        osc2.type = 'sine'; osc2.frequency.setValueAtTime(783.99, now + 0.15);
        gain2.gain.setValueAtTime(0.3, now + 0.15);
        gain2.gain.exponentialRampToValueAtTime(0.01, now + 0.7);
        osc2.connect(gain2); gain2.connect(audioCtx.destination);
        osc2.start(now + 0.15); osc2.stop(now + 0.7);
    }

    function playBatsuSound() {
        initAudio();
        const now = audioCtx.currentTime, duration = 1.0;
        const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(320, now);
        osc.frequency.linearRampToValueAtTime(110, now + duration);
        const lfo = audioCtx.createOscillator(), lfoGain = audioCtx.createGain();
        lfo.frequency.setValueAtTime(9, now); lfoGain.gain.setValueAtTime(35, now);
        lfo.connect(lfoGain); lfoGain.connect(osc.frequency);
        gain.gain.setValueAtTime(0.2, now);
        gain.gain.linearRampToValueAtTime(0.18, now + 0.2);
        gain.gain.exponentialRampToValueAtTime(0.001, now + duration);
        osc.connect(gain); gain.connect(audioCtx.destination);
        lfo.start(now); osc.start(now); lfo.stop(now + duration); osc.stop(now + duration);
    }

    function createHappySparkles() {
        const colors = ['#FFD700','#FF69B4','#00FFFF','#ADFF2F','#FF4500','#9370DB','#32CD32'];
        const shapes = ['★','🌸','✨','♦','●','🎵'];
        for (let i = 0; i < 25; i++) {
            const s = document.createElement('div');
            s.className = 'sparkle';
            s.textContent = shapes[Math.floor(Math.random() * shapes.length)];
            s.style.color = colors[Math.floor(Math.random() * colors.length)];
            s.style.left = '50%'; s.style.top = '50%';
            const angle = Math.random() * Math.PI * 2, dist = 100 + Math.random() * 200;
            s.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
            s.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
            s.style.setProperty('--rot', (Math.random() * 360 - 180) + 'deg');
            const dur = 0.6 + Math.random() * 0.4;
            s.style.animation = `sparkle-burst ${dur}s forwards cubic-bezier(0.1, 0.8, 0.3, 1)`;
            imageArea.appendChild(s);
            setTimeout(() => s.remove(), dur * 1000);
        }
    }

    function positionBatsuOverlay() {
        if (imageArea.classList.contains('has-image') && previewImage.style.display !== 'none') {
            const rect = previewImage.getBoundingClientRect();
            const parentRect = imageArea.getBoundingClientRect();
            batsuOverlay.style.width  = rect.width + 'px';
            batsuOverlay.style.height = rect.height + 'px';
            batsuOverlay.style.top    = (rect.top - parentRect.top) + 'px';
            batsuOverlay.style.left   = (rect.left - parentRect.left) + 'px';
        }
    }

    previewImage.addEventListener('load', positionBatsuOverlay);
    window.addEventListener('resize', positionBatsuOverlay);

    async function startCamera() {
        placeholder.style.display = 'none';
        previewImage.style.display = 'none';
        cameraVideo.style.display = 'block';
        initialButtons.style.display = 'none';
        cameraButtons.style.display = 'flex';
        currentFacingMode = isIOS() ? 'environment' : 'user';
        try {
            localStream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: currentFacingMode, width: { ideal: 1280 }, height: { ideal: 720 } },
                audio: false
            });
            cameraVideo.srcObject = localStream;
            cameraVideo.style.transform = currentFacingMode === 'user' ? 'scaleX(-1)' : 'scaleX(1)';
        } catch (err) {
            console.warn("カメラ起動失敗", err);
            stopCamera();
            fallbackCameraInput.click();
        }
    }

    function stopCamera() {
        if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
        cameraVideo.srcObject = null;
        cameraVideo.style.display = 'none';
    }

    function takePhoto() {
        if (!localStream) return;
        captureCanvas.width = cameraVideo.videoWidth;
        captureCanvas.height = cameraVideo.videoHeight;
        const ctx = captureCanvas.getContext('2d');
        if (currentFacingMode === 'user') { ctx.translate(captureCanvas.width, 0); ctx.scale(-1, 1); }
        ctx.drawImage(cameraVideo, 0, 0, captureCanvas.width, captureCanvas.height);
        previewImage.src = captureCanvas.toDataURL('image/png');
        previewImage.style.display = 'block';
        imageArea.classList.add('has-image');
        stopCamera();
        cameraButtons.style.display = 'none';
        hiddenQuizTrigger.style.display = 'block';
    }

    btnStartCamera.addEventListener('click', startCamera);
    btnShutter.addEventListener('click', takePhoto);
    btnCancelCamera.addEventListener('click', () => {
        stopCamera();
        cameraButtons.style.display = 'none';
        initialButtons.style.display = 'flex';
        placeholder.style.display = 'flex';
    });
    fallbackCameraInput.addEventListener('change', (e) => {
        if (e.target.files.length > 0) handleFile(e.target.files[0]);
        else resetApp();
    });

    function handleFile(file) {
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            previewImage.src = e.target.result;
            previewImage.style.display = 'block';
            placeholder.style.display = 'none';
            imageArea.classList.add('has-image');
            initialButtons.style.display = 'none';
            hiddenQuizTrigger.style.display = 'block';
        };
        reader.readAsDataURL(file);
    }

    inputGallery.addEventListener('change', (e) => handleFile(e.target.files[0]));

    imageArea.addEventListener('click', () => {
        if (!localStream && !imageArea.classList.contains('has-image')) inputGallery.click();
    });
    imageArea.addEventListener('dragover', (e) => {
        e.preventDefault();
        if (!localStream && !imageArea.classList.contains('has-image')) {
            imageArea.style.borderColor = '#4a90e2';
            imageArea.style.backgroundColor = '#e0f0ff';
        }
    });
    imageArea.addEventListener('dragleave', (e) => {
        e.preventDefault();
        if (!localStream && !imageArea.classList.contains('has-image')) {
            imageArea.style.borderColor = '#aaaaaa';
            imageArea.style.backgroundColor = '#e0e0e0';
        }
    });
    imageArea.addEventListener('drop', (e) => {
        e.preventDefault();
        if (!localStream && !imageArea.classList.contains('has-image')) {
            imageArea.style.borderColor = '#aaaaaa';
            imageArea.style.backgroundColor = '#e0e0e0';
            if (e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files[0]);
        }
    });

    function handleMaruSelect() {
        playMaruSound();
        circleOverlay.classList.add('show');
        createHappySparkles();
        mamoruJump();
        showNextPhase();
    }

    function handleBatsuSelect() {
        playBatsuSound();
        positionBatsuOverlay();
        batsuOverlay.classList.add('show');
        mamoruSad();
        showNextPhase();
    }

    hitMaru.addEventListener('click', (e) => { e.stopPropagation(); handleMaruSelect(); });
    hitBatsu.addEventListener('click', (e) => { e.stopPropagation(); handleBatsuSelect(); });

    function showNextPhase() {
        hiddenQuizTrigger.style.display = 'none';
        btnNext.style.display = 'inline-flex';
    }

    document.addEventListener('keydown', (e) => {
        if (hiddenQuizTrigger.style.display === 'block') {
            if (e.key === 'ArrowLeft') handleMaruSelect();
            else if (e.key === 'ArrowRight') handleBatsuSelect();
        } else if (btnNext.style.display === 'inline-flex') {
            if (e.key === 'Enter' || e.key === ' ') btnNext.click();
        }
    });

    btnNext.addEventListener('click', () => {
        const isMaruActive = circleOverlay.classList.contains('show');
        const isBatsuActive = batsuOverlay.classList.contains('show');
        btnNext.style.display = 'none';

        if (isMaruActive) {
            circleOverlay.classList.remove('show');
            circleOverlay.classList.add('fade-out-animation');
            document.querySelectorAll('.sparkle').forEach(s => {
                s.style.transition = 'all 0.5s ease';
                s.style.transform = 'translateY(-150px)';
                s.style.opacity = '0';
            });
            setTimeout(() => {
                resetApp();
                circleOverlay.classList.remove('fade-out-animation');
            }, 600);
        } else if (isBatsuActive) {
            batsuOverlay.classList.add('fade-out');
            batsuOverlay.classList.remove('show');
            setTimeout(() => {
                resetApp();
                batsuOverlay.classList.remove('fade-out');
            }, 400);
        } else {
            resetApp();
        }
        resetMamoru();
    });

    function resetApp() {
        stopCamera();
        previewImage.src = '';
        previewImage.style.display = 'none';
        placeholder.style.display = 'flex';
        imageArea.classList.remove('has-image');
        circleOverlay.classList.remove('show', 'fade-out-animation');
        batsuOverlay.classList.remove('show', 'fade-out');
        currentFacingMode = 'user';
        batsuOverlay.style.width = batsuOverlay.style.height = batsuOverlay.style.top = batsuOverlay.style.left = '';
        document.querySelectorAll('.sparkle').forEach(s => s.remove());
        inputGallery.value = ''; fallbackCameraInput.value = '';
        btnNext.style.display = 'none';
        cameraButtons.style.display = 'none';
        initialButtons.style.display = 'flex';
    }

    let lastTouchEnd = 0;
    document.documentElement.addEventListener('touchend', (event) => {
        const now = Date.now();
        if (now - lastTouchEnd <= 300) event.preventDefault();
        lastTouchEnd = now;
    }, false);

</script>
</body>
</html>
